name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    - name: Run tests and verify build
      env:
        MVX_USE_SYSTEM_JAVA: true
      run: ./mvx mvn -- --no-transfer-progress verify

    - name: Test website build
      env:
        MVX_USE_SYSTEM_JAVA: true
      run: QUARKUS_ROQ_GENERATOR_BATCH=true ./mvx mvn -- --no-transfer-progress -f website clean package quarkus:run -DskipTests -P include-javadocs

    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results
        path: |
          core/target/surefire-reports/
          website/target/surefire-reports/
        retention-days: 7

